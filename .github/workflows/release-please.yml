on:
  push:
    branches:
      - main

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      release_id: ${{ steps.release.outputs.id }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-tauri:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            # Space-separated: passed to `rustup target add`, not to an action.
            rust_targets: aarch64-apple-darwin x86_64-apple-darwin
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            rust_targets: ''
            args: ''
          - platform: windows-latest
            rust_targets: ''
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Tauri / Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Targets have to land on the toolchain rust-toolchain.toml pins, not on
      # whatever the step above made the default — that mismatch is what broke
      # the universal build: the targets went to `stable` while tauri built with
      # the pinned toolchain and found none. `rustup target add` run inside the
      # repo resolves through the pin file, so this can't drift apart again.
      - name: Add build targets to the pinned toolchain
        if: matrix.rust_targets != ''
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.release-please.outputs.release_id }}
          args: ${{ matrix.args }}
