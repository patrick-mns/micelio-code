name: Rust

# dev is where the work happens and main only receives finished branches, so
# gating on main alone means nothing is ever checked before it lands.
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Formatting needs neither the Tauri system libraries nor a compile, so it
    # runs first: a whitespace-only failure comes back in seconds.
    - name: Check formatting
      run: cargo fmt --check

    - name: Install dependencies (Tauri)
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Build
      run: cargo build
    - name: Clippy
      run: cargo clippy --all-targets -- -D warnings
    - name: Run tests
      run: cargo test
