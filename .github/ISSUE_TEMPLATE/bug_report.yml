name: Bug Report
description: Create a report to help us improve Micelio Code
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open Micelio Code
        2. Chat with model '...'
        3. Send context '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: What operating system and version are you using?
      placeholder: "e.g. macOS Sonoma 14.5, Windows 11, Ubuntu 22.04"
    validations:
      required: true
