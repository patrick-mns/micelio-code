<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#26261f"/>
      <stop offset="1" stop-color="#121210"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tileGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="205" ry="205" fill="url(#surface)"/>
  <rect x="64" y="64" width="896" height="896" rx="205" ry="205" fill="url(#sheen)"/>
  <rect x="67" y="67" width="890" height="890" rx="202" ry="202" fill="none"
        stroke="#ffffff" stroke-opacity="0.10" stroke-width="3"/>

  <!-- treemap glyph — all-green ramp -->
  <g transform="translate(512 512) scale(1.2) translate(-250 -250)">
    <g>
      <rect x="0"   y="0"   width="292" height="292" rx="26" fill="#1f9d57"/>
      <rect x="308" y="0"   width="192" height="140" rx="22" fill="#4ade80"/>
      <rect x="308" y="156" width="192" height="136" rx="22" fill="#15803d"/>
      <rect x="0"   y="308" width="180" height="192" rx="22" fill="#34d058"/>
      <rect x="196" y="308" width="138" height="192" rx="22" fill="#0e7a52"/>
      <rect x="350" y="308" width="150" height="100" rx="20" fill="#86efac"/>
      <rect x="350" y="424" width="150" height="76"  rx="18" fill="#166534"/>
    </g>
    <g fill="url(#tileGloss)">
      <rect x="0"   y="0"   width="292" height="292" rx="26"/>
      <rect x="308" y="0"   width="192" height="140" rx="22"/>
      <rect x="308" y="156" width="192" height="136" rx="22"/>
      <rect x="0"   y="308" width="180" height="192" rx="22"/>
      <rect x="196" y="308" width="138" height="192" rx="22"/>
      <rect x="350" y="308" width="150" height="100" rx="20"/>
      <rect x="350" y="424" width="150" height="76"  rx="18"/>
    </g>
  </g>
</svg>
